# Must match the Cloudflare Pages project name exactly, or git-connected
# builds fail before they start.
name = "gst-check-1fd499c51792"
compatibility_date = "2026-01-01"
pages_build_output_dir = "dist"

# Cache for registry lookups + the daily spend counter.
[[kv_namespaces]]
binding = "GST_CACHE"
id = "8d64dd22a2f84843a4a469b1da423ad6"

[vars]
# 'mock' is free and offline; 'appyflow' and 'gstincheck' hit paid registry APIs.
GST_PROVIDER = "gstincheck"

# "open" = no passphrase; the unguessable URL is the only thing limiting access.
# Because of that, DAILY_LOOKUP_CAP is the real spend ceiling — keep it low.
# Appyflow's free tier is 50 requests TOTAL, so 25/day means a single bad day
# cannot exhaust it. Raise this after topping up.
AUTH_MODE = "open"
DAILY_LOOKUP_CAP = "25"

# Secrets are NOT set here. Set them with:
#   npx wrangler pages secret put APP_PASSWORD
#   npx wrangler pages secret put AUTH_SECRET
#   npx wrangler pages secret put GST_API_KEY
